databaseChangeLog:
  - changeSet:
      id: 202604221456
      author: Lucas
      changes:
        - createTable:
            tableName: car
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_car
                    nullable: false

              - column:
                  name: marca
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: modelo
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: ano
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: placa
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: dono_id
                  type: bigint
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: car
            baseColumnNames: dono_id
            referencedTableName: dono
            referencedColumnNames: id
            constraintName: fk_car_dono