databaseChangeLog:
  - changeSet:
      id: 202607141400
      author: Lucas
      changes:
        - createTable:
            tableName: dono
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_dono
                    nullable: false

              - column:
                  name: nome
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: cpf
                  type: varchar(14)
                  constraints:
                    nullable: false
                    unique: true